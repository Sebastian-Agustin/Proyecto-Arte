<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <title>Login - ArteInTheWorld</title>
</head>
<body id="body-login">
    <div id="login-wrapper">
        <img src="assets/art-svgrepo-com.svg" alt="ArteInTheWorld logo" id="logo-login">
        
        <div class="login-container">
            <h2 class="login-title">Te damos la bienvenida!</h2>
            <p class="login-subtitle">Ingresá tus datos para continuar</p>
            
            <form id="form-login">
                <input type="email" placeholder="Email" id="login-email">
                <input type="password" placeholder="Contraseña" id="login-password">
                <input type="submit" id="login-submit" value="Ingresar">
            </form>

            <div id="login-error"></div>

            <p class="login-register">¿No tenés cuenta? 
                <span id="ir-a-register">Registrate</span>
            </p>
        </div>
    </div>
    <script type="module" src="login.js"></script>
</body>
</html>
